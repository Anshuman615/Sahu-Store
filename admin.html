<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAHU STORE — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E85D04;
    --orange-light: #F48C06;
    --dark: #0D0D0D;
    --dark2: #1A1A1A;
    --dark3: #252525;
    --steel: #8B8B8B;
    --light: #F5F0E8;
    --white: #FFFFFF;
    --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--dark); color: var(--light); min-height: 100vh; }

  /* LOGIN */
  #loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; background: radial-gradient(circle at 50% 40%, rgba(232,93,4,0.12) 0%, transparent 65%); }
  .login-box { background: var(--dark2); border: 1px solid rgba(232,93,4,0.3); padding: 2.5rem 2rem; width: 100%; max-width: 380px; text-align: center; position: relative; }
  .login-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--orange), var(--orange-light)); }
  .login-logo { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; color: var(--white); margin-bottom: 0.2rem; }
  .login-logo span { color: var(--orange); }
  .login-sub { font-size: 0.75rem; color: var(--steel); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 2rem; }
  .login-box input { width: 100%; background: var(--dark3); border: 1px solid rgba(255,255,255,0.08); color: var(--light); padding: 14px 16px; font-size: 1.1rem; outline: none; margin-bottom: 1rem; text-align: center; letter-spacing: 6px; font-family: 'Barlow', sans-serif; transition: border-color 0.2s; }
  .login-box input:focus { border-color: var(--orange); }
  .login-btn { width: 100%; background: var(--orange); color: var(--white); padding: 15px; font-family: 'Barlow', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: none; cursor: pointer; transition: background 0.2s, transform 0.15s; }
  .login-btn:hover { background: var(--orange-light); transform: translateY(-1px); }
  .login-error { color: var(--red); font-size: 0.85rem; margin-top: 1rem; display: none; padding: 10px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }

  /* DASHBOARD */
  #dashboard { display: none; }
  .top-bar { background: var(--dark2); border-bottom: 1px solid rgba(232,93,4,0.2); padding: 0 1.5rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .top-logo { font-family: 'Bebas Neue', cursive; font-size: 1.6rem; color: var(--white); }
  .top-logo span { color: var(--orange); }
  .top-right { display: flex; align-items: center; gap: 0.8rem; }
  .admin-badge { background: rgba(232,93,4,0.15); border: 1px solid rgba(232,93,4,0.3); padding: 5px 12px; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); }
  .logout-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--steel); padding: 7px 14px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-family: 'Barlow', sans-serif; }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  .dashboard-body { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.05); padding: 1.2rem 1.5rem; position: relative; overflow: hidden; }
  .stat-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--orange); transform: scaleX(0); transition: transform 0.3s; transform-origin: left; }
  .stat-card:hover::after { transform: scaleX(1); }
  .stat-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--steel); margin-bottom: 0.5rem; }
  .stat-val { font-family: 'Bebas Neue', cursive; font-size: 2.8rem; color: var(--orange); line-height: 1; }
  .stat-sub { font-size: 0.75rem; color: var(--steel); margin-top: 0.3rem; }

  /* TABLE */
  .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.8rem; }
  .table-title { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 2px; }
  .refresh-btn { background: var(--orange); color: var(--white); border: none; padding: 10px 20px; font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; cursor: pointer; transition: background 0.2s; }
  .refresh-btn:hover { background: var(--orange-light); }

  /* Desktop Table */
  .table-wrap { overflow-x: auto; }
  .orders-table { width: 100%; border-collapse: collapse; min-width: 750px; }
  .orders-table th { background: var(--dark3); padding: 12px 14px; text-align: left; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--steel); border-bottom: 1px solid rgba(232,93,4,0.2); white-space: nowrap; }
  .orders-table td { padding: 12px 14px; font-size: 0.88rem; color: var(--light); border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  .orders-table tr:hover td { background: rgba(255,255,255,0.02); }

  /* Mobile Cards */
  .order-cards { display: none; }
  .order-card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.06); border-left: 3px solid var(--orange); padding: 1.2rem; margin-bottom: 0.8rem; }
  .order-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
  .order-card-name { font-family: 'Bebas Neue', cursive; font-size: 1.3rem; color: var(--white); line-height: 1; }
  .order-card-id { font-size: 0.72rem; color: var(--steel); letter-spacing: 1px; }
  .order-card-product { font-size: 0.9rem; font-weight: 600; color: var(--orange-light); margin-bottom: 0.6rem; }
  .order-card-row { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.82rem; color: var(--steel); margin-bottom: 0.5rem; }
  .order-card-notes { font-size: 0.82rem; color: var(--steel); border-top: 1px solid rgba(255,255,255,0.06); padding-top: 0.6rem; margin-top: 0.4rem; }
  .order-card-time { font-size: 0.72rem; color: rgba(139,139,139,0.6); margin-top: 0.6rem; }

  /* Badges & Buttons */
  .badge-new { background: rgba(232,93,4,0.15); border: 1px solid rgba(232,93,4,0.4); color: var(--orange); padding: 3px 10px; font-size: 0.7rem; font-weight: 600; letter-spacing: 1px; white-space: nowrap; }

  /* Delete button — table */
  .del-btn { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.35); color: var(--red); padding: 5px 12px; font-size: 0.75rem; font-weight: 600; cursor: pointer; font-family: 'Barlow', sans-serif; transition: background 0.2s; white-space: nowrap; }
  .del-btn:hover { background: rgba(239,68,68,0.28); }

  /* Delete button — mobile card */
  .card-del-btn { width: 100%; margin-top: 0.8rem; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); padding: 9px; font-size: 0.82rem; font-weight: 600; letter-spacing: 1px; cursor: pointer; font-family: 'Barlow', sans-serif; transition: background 0.2s; text-align: center; }
  .card-del-btn:hover { background: rgba(239,68,68,0.25); }

  /* Empty */
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--steel); }
  .empty-state .big { font-size: 3rem; margin-bottom: 1rem; }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
    .stat-val { font-size: 2rem; }
    .stat-label { font-size: 0.62rem; letter-spacing: 1px; }
    .stat-card { padding: 1rem; }
    .table-wrap { display: none; }
    .order-cards { display: block; }
    .dashboard-body { padding: 1rem; }
    .top-bar { padding: 0 1rem; }
    .admin-badge { display: none; }
  }
  @media (max-width: 400px) {
    .stats-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">SAHU <span>STORE</span></div>
    <div class="login-sub">Admin Panel</div>
    <input type="password" id="passInput" placeholder="Enter Password"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="login-error" id="loginError">❌ Galat password! Dobara try karo.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <div class="top-logo">SAHU <span>STORE</span></div>
    <div class="top-right">
      <div class="admin-badge">Admin</div>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <div class="dashboard-body">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-val" id="totalOrders">—</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today</div>
        <div class="stat-val" id="todayOrders">—</div>
        <div class="stat-sub">Orders today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top Product</div>
        <div class="stat-val" id="topProduct" style="font-size:1.2rem;margin-top:0.5rem">—</div>
        <div class="stat-sub">Most ordered</div>
      </div>
    </div>

    <div class="table-header">
      <div class="table-title">All Orders</div>
      <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
    </div>

    <!-- Desktop Table -->
    <div class="table-wrap">
      <table class="orders-table">
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Phone</th><th>Product</th>
            <th>Qty</th><th>City</th><th>Notes</th><th>Time</th><th>Status</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="10"><div class="empty-state"><div class="big">📦</div><p>Loading...</p></div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- Mobile Cards -->
    <div class="order-cards" id="orderCards">
      <div class="empty-state"><div class="big">📦</div><p>Loading...</p></div>
    </div>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC5YBdn1NQLUHCjcdwN64HHIp8VeifvKbA",
    authDomain: "sahu-store-d64c7.firebaseapp.com",
    projectId: "sahu-store-d64c7",
    storageBucket: "sahu-store-d64c7.firebasestorage.app",
    messagingSenderId: "454836597278",
    appId: "1:454836597278:web:0ae56fd51e50a956b4b40f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ADMIN_PASSWORD = "Lisa@Basant";

  // ===== LOGIN =====
  window.doLogin = function() {
    const pass = document.getElementById('passInput').value;
    if (pass === ADMIN_PASSWORD) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadOrders();
    } else {
      const err = document.getElementById('loginError');
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 3000);
    }
  };

  // ===== LOAD ORDERS =====
  window.loadOrders = async function() {
    try {
      const q = query(collection(db, 'orders'), orderBy('time', 'desc'));
      const snapshot = await getDocs(q);

      const orders = [];
      let idx = snapshot.size;
      snapshot.forEach(docSnap => {
        const d = docSnap.data();
        orders.push({
          docId: docSnap.id,   // Firebase document ID — delete ke liye
          id: idx--,
          name: d.name,
          phone: d.phone,
          product: d.product,
          quantity: d.quantity || '',
          city: d.city || '',
          notes: d.notes || '',
          time: d.time ? new Date(d.time.seconds * 1000).toLocaleString('en-IN') : '—',
          timeObj: d.time ? new Date(d.time.seconds * 1000) : null
        });
      });

      // Stats
      document.getElementById('totalOrders').textContent = orders.length;
      const today = new Date();
      const todayCount = orders.filter(o => o.timeObj && o.timeObj.toDateString() === today.toDateString()).length;
      document.getElementById('todayOrders').textContent = todayCount;

      if (orders.length > 0) {
        const freq = {};
        orders.forEach(o => { freq[o.product] = (freq[o.product] || 0) + 1; });
        const top = Object.entries(freq).sort((a,b) => b[1]-a[1])[0][0];
        document.getElementById('topProduct').textContent = top.split('(')[0].trim().slice(0, 14);
      }

      if (orders.length === 0) {
        document.getElementById('tableBody').innerHTML =
          `<tr><td colspan="10"><div class="empty-state"><div class="big">📭</div><p>Abhi koi order nahi aaya.</p></div></td></tr>`;
        document.getElementById('orderCards').innerHTML =
          `<div class="empty-state"><div class="big">📭</div><p>Abhi koi order nahi aaya.</p></div>`;
        return;
      }

      // Desktop table
      document.getElementById('tableBody').innerHTML = orders.map(o => `
        <tr id="row-${o.docId}">
          <td style="color:var(--steel)">#${o.id}</td>
          <td><strong>${o.name}</strong></td>
          <td><a href="tel:${o.phone}" style="color:var(--orange-light);text-decoration:none">${o.phone}</a></td>
          <td style="color:var(--orange-light)">${o.product}</td>
          <td>${o.quantity || '—'}</td>
          <td>${o.city || '—'}</td>
          <td style="color:var(--steel);max-width:140px">${o.notes || '—'}</td>
          <td style="color:var(--steel);font-size:0.8rem;white-space:nowrap">${o.time}</td>
          <td><span class="badge-new">New</span></td>
          <td><button class="del-btn" onclick="deleteOrder('${o.docId}')">🗑️ Delete</button></td>
        </tr>`).join('');

      // Mobile cards
      document.getElementById('orderCards').innerHTML = orders.map(o => `
        <div class="order-card" id="card-${o.docId}">
          <div class="order-card-top">
            <div>
              <div class="order-card-name">${o.name}</div>
              <div class="order-card-id">Order #${o.id}</div>
            </div>
            <span class="badge-new">New</span>
          </div>
          <div class="order-card-product">📦 ${o.product}</div>
          <div class="order-card-row">
            <span>📞 <a href="tel:${o.phone}" style="color:var(--orange-light);text-decoration:none">${o.phone}</a></span>
            ${o.quantity ? `<span>🔢 ${o.quantity}</span>` : ''}
            ${o.city ? `<span>📍 ${o.city}</span>` : ''}
          </div>
          ${o.notes ? `<div class="order-card-notes">💬 ${o.notes}</div>` : ''}
          <div class="order-card-time">🕐 ${o.time}</div>
          <button class="card-del-btn" onclick="deleteOrder('${o.docId}')">🗑️ Delete Order</button>
        </div>`).join('');

    } catch(err) {
      console.error(err);
      alert('Orders load nahi hue! Console check karo.');
    }
  };

  // ===== DELETE ORDER =====
  window.deleteOrder = async function(docId) {
    if (!confirm('Yeh order delete karna chahte ho? Wapas nahi aayega!')) return;
    try {
      await deleteDoc(doc(db, 'orders', docId));
      // UI se bhi hata do turant
      const row = document.getElementById('row-' + docId);
      const card = document.getElementById('card-' + docId);
      if (row) row.remove();
      if (card) card.remove();
      // Stats reload
      loadOrders();
    } catch(err) {
      console.error(err);
      alert('Delete nahi hua! Dobara try karo.');
    }
  };

  // ===== LOGOUT =====
  window.logout = function() {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('passInput').value = '';
  };
</script>
</body>

</html>
